name: Sync Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run sync
        run: |
          curl --fail-with-body --show-error --silent -X POST "${{ vars.VERCEL_URL }}/api/sync" \
            -H "x-api-key: ${{ secrets.ADMIN_PASSWORD }}"
